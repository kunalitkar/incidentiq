<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incidentiq — AI Incident Intelligence</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--blue)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span class="logo-text">Incident<span class="logo-accent">iq</span></span>
    <span class="badge" id="ai-source-badge">AI · Simulation</span>
  </div>
  <div class="header-center">
    <div class="hstat"><span id="h-total">0</span><label>LOGS</label></div>
    <div class="hstat info"><span id="h-info">0</span><label>INFO</label></div>
    <div class="hstat warn"><span id="h-warn">0</span><label>WARN</label></div>
    <div class="hstat err"><span id="h-errors">0</span><label>ERROR</label></div>
  </div>
  <div class="system-status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-label">Monitoring</span>
  </div>
</header>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <!-- Scenario buttons -->
  <div class="scenario-group">
    <span class="toolbar-label">Simulate:</span>
    <button class="btn btn-scene" data-scenario="db">
      <span class="scene-icon">🗄</span> DB Failure
    </button>
    <button class="btn btn-scene" data-scenario="latency">
      <span class="scene-icon">⏱</span> Latency Issue
    </button>
    <button class="btn btn-scene" data-scenario="auth">
      <span class="scene-icon">🔐</span> Auth Failure
    </button>
    <button class="btn btn-scene" data-scenario="mixed">
      <span class="scene-icon">⚡</span> Mixed
    </button>
  </div>

  <div class="toolbar-divider"></div>

  <!-- Action buttons -->
  <div class="action-group">
    <button class="btn btn-analyze" id="btn-analyze" disabled>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Analyze Logs
    </button>
    <button class="btn btn-fix" id="btn-fix" disabled>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      Apply Fix
    </button>
  </div>
</div>

<!-- ── Main 3-column grid ── -->
<main>

  <!-- LEFT — Log Stream -->
  <section class="panel" id="log-panel">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        Live Log Stream
      </div>
      <span id="log-count" class="panel-meta">0 lines</span>
    </div>
    <div id="log-output" class="log-output">
      <div class="empty-state">
        <div class="empty-icon">▋</div>
        <div>Select a scenario above to generate logs</div>
      </div>
    </div>
  </section>

  <!-- CENTER — Incident Detection -->
  <section class="panel" id="incident-panel">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Incident Detection
      </div>
      <span id="incident-status-badge" class="status-badge badge-idle">IDLE</span>
    </div>

    <div id="incident-body" class="panel-body">
      <div class="empty-state">
        <div class="empty-icon">◎</div>
        <div>Run analysis to detect incidents</div>
      </div>
    </div>

    <!-- Timeline -->
    <div id="timeline-section" class="timeline-section" style="display:none">
      <div class="tl-header">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Incident Timeline
      </div>
      <div id="timeline-body" class="timeline-body"></div>
    </div>
  </section>

  <!-- RIGHT — AI Insights -->
  <section class="panel" id="ai-panel">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        AI Insights
      </div>
      <span id="ai-engine-label" class="panel-meta">Incidentiq Engine</span>
    </div>

    <!-- AI thinking animation -->
    <div id="ai-thinking" class="ai-thinking" style="display:none">
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
      <div id="thinking-label" class="thinking-label">Analyzing logs...</div>
    </div>

    <div id="ai-body" class="panel-body ai-body">
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <div>AI analysis will appear after detection</div>
      </div>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
