<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incidentiq — AI Incident Intelligence</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--blue)"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span class="logo-text">Incident<span class="logo-accent">iq</span></span>
    <span class="badge">AI Incident Intelligence</span>
  </div>

  <div class="header-right">
    <div class="header-stat"><span id="h-total">0</span> logs</div>
    <div class="header-stat err"><span id="h-errors">0</span> errors</div>
    <div class="system-status" id="system-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-label">Monitoring</span>
    </div>
  </div>
</header>

<!-- ── Action Bar ── -->
<div class="action-bar">
  <button class="btn btn-primary" id="btn-generate">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Generate Logs
  </button>
  <button class="btn btn-secondary" id="btn-analyze" disabled>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Analyze Incident
  </button>
  <button class="btn btn-success" id="btn-fix" disabled>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    Apply Fix
  </button>
</div>

<!-- ── Main 3-column grid ── -->
<main>

  <!-- LEFT — Log Stream -->
  <section class="panel" id="log-panel">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        Live Log Stream
      </div>
      <span id="log-count" class="panel-meta">0 lines</span>
    </div>

    <div class="log-stats">
      <div class="log-stat info-stat"><span id="s-info">0</span><label>INFO</label></div>
      <div class="log-stat warn-stat"><span id="s-warn">0</span><label>WARN</label></div>
      <div class="log-stat err-stat"><span id="s-error">0</span><label>ERROR</label></div>
    </div>

    <div id="log-output" class="log-output">
      <div class="empty-state">
        <div class="empty-icon">▋</div>
        <div>No logs — click Generate Logs to begin</div>
      </div>
    </div>
  </section>

  <!-- CENTER — Incident Detection -->
  <section class="panel" id="incident-panel">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Incident Detection
      </div>
      <span id="incident-status-badge" class="status-badge badge-idle">IDLE</span>
    </div>

    <div id="incident-body" class="panel-body">
      <div class="empty-state">
        <div class="empty-icon">◎</div>
        <div>Run analysis to detect incidents</div>
      </div>
    </div>

    <!-- Incident Timeline -->
    <div id="timeline-section" class="timeline-section" style="display:none">
      <div class="panel-header" style="border-top:1px solid var(--border);border-bottom:none;padding-top:12px">
        <div class="panel-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Incident Timeline
        </div>
      </div>
      <div id="timeline-body" class="timeline-body"></div>
    </div>
  </section>

  <!-- RIGHT — AI Insights -->
  <section class="panel" id="ai-panel">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><circle cx="18" cy="6" r="3" fill="var(--purple)" stroke="none"/></svg>
        AI Insights
      </div>
      <span id="ai-model-badge" class="panel-meta">Incidentiq Engine v2</span>
    </div>

    <div id="ai-body" class="panel-body ai-body">
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <div>AI analysis will appear after detection</div>
      </div>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
